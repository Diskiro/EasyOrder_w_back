version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: easyorder-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supabase_dummy_password_123
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: easyorder-adminer
    restart: always
    ports:
      - 8080:8080
    depends_on:
      - db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easyorder-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=supabase_dummy_password_123
      - DB_NAME=postgres
      - JWT_SECRET=super_secret_jwt_key_for_easyorder
      - CORS_ORIGIN=http://localhost,http://127.0.0.1
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: easyorder-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:

